    </section>

  <script>
    (async () => {
      const esc = s => String(s ?? "").replace(/[&<>"]/g, c =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
      const log = document.getElementById("update-log");
      try {
        const items = await (await fetch("data/updates.json")).json();
        log.innerHTML = items.map(u =>
          `<li><span class="update-date">${esc(u.date)}</span> ${esc(u.text)}</li>`).join("");
      } catch (e) {
        log.innerHTML = "<li>更新履歴を読み込めませんでした。</li>";
      }
    })();
  </script>
