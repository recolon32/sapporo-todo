<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>リダイレクト | 数字で見る札幌市</title>
  <script>
    // 旧URL（issue.html?id=...）を新しい静的URL（i/<id>.html）へ転送
    var id = new URLSearchParams(location.search).get("id");
    location.replace(id ? "i/" + encodeURIComponent(id) + ".html" : "index.html");
  </script>
</head>
<body>
  <p>移動しています… <a href="index.html">課題一覧へ</a></p>
</body>
</html>
